<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harrison 22e — Asistente de Examen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f7f6f3; --surface:#fff; --surface2:#f1efe8;
  --border:rgba(0,0,0,0.11); --border2:rgba(0,0,0,0.2);
  --text:#1a1a18; --text2:#5f5e5a; --text3:#888780;
  --accent:#185fa5; --accent-bg:#e6f1fb; --accent-t:#0c447c;
  --r:12px; --rs:8px;
  --c-blue-bg:#e6f1fb;   --c-blue-t:#0c447c;   --c-blue-b:#378add;
  --c-teal-bg:#e1f5ee;   --c-teal-t:#0f6e56;   --c-teal-b:#1d9e75;
  --c-purple-bg:#eeedfe; --c-purple-t:#3c3489; --c-purple-b:#7f77dd;
  --c-amber-bg:#faeeda;  --c-amber-t:#854f0b;  --c-amber-b:#ef9f27;
  --c-coral-bg:#faece7;  --c-coral-t:#993c1d;  --c-coral-b:#d85a30;
  --c-pink-bg:#fbeaf0;   --c-pink-t:#72243e;   --c-pink-b:#d4537e;
  --c-green-bg:#eaf3de;  --c-green-t:#3b6d11;  --c-green-b:#639922;
  --c-red-bg:#fcebeb;    --c-red-t:#791f1f;    --c-red-b:#e24b4a;
  --c-gray-bg:#f1efe8;   --c-gray-t:#444441;   --c-gray-b:#888780;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a; --surface:#252522; --surface2:#2c2c2a;
    --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.18);
    --text:#f0ede6; --text2:#b4b2a9; --text3:#888780;
    --accent:#378add; --accent-bg:#042c53; --accent-t:#b5d4f4;
    --c-blue-bg:#042c53;   --c-blue-t:#b5d4f4;
    --c-teal-bg:#04342c;   --c-teal-t:#9fe1cb;
    --c-purple-bg:#26215c; --c-purple-t:#cecbf6;
    --c-amber-bg:#412402;  --c-amber-t:#fac775;
    --c-coral-bg:#4a1b0c;  --c-coral-t:#f0997b;
    --c-pink-bg:#4b1528;   --c-pink-t:#ed93b1;
    --c-green-bg:#173404;  --c-green-t:#c0dd97;
    --c-red-bg:#501313;    --c-red-t:#f7c1c1;
    --c-gray-bg:#2c2c2a;   --c-gray-t:#d3d1c7;
  }
}

body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
header{ background:var(--surface); border-bottom:.5px solid var(--border); padding:.85rem 1.25rem; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:30; }
.logo{ width:32px; height:32px; background:var(--c-blue-bg); border-radius:var(--rs); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:16px; flex-shrink:0; }
header h1{ font-size:14px; font-weight:500; }
header p{ font-size:11px; color:var(--text3); }
.hbadge{ margin-left:auto; font-size:11px; padding:3px 9px; background:var(--c-green-bg); color:var(--c-green-t); border-radius:20px; font-weight:500; white-space:nowrap; }

/* TAB BAR */
.tab-bar{ background:var(--surface); border-bottom:.5px solid var(--border); display:flex; padding:0 .75rem; position:sticky; top:54px; z-index:20; }
.tab-btn{ display:flex; align-items:center; gap:5px; padding:10px 16px; font-size:13px; font-weight:500; color:var(--text3); border:none; background:transparent; border-bottom:2px solid transparent; cursor:pointer; transition:color .15s,border-color .15s; border-radius:0; font-family:inherit; }
.tab-btn:hover{ color:var(--text); background:transparent; }
.tab-btn.active{ color:var(--accent); border-bottom-color:var(--accent); }
.tab-btn i{ font-size:15px; }

/* PANELS */
.tab-panel{ display:none; }
.tab-panel.active{ display:block; }
main{ flex:1; max-width:760px; width:100%; margin:0 auto; padding:1.25rem 1rem 5.5rem; display:flex; flex-direction:column; gap:1rem; }

/* BUTTONS */
button{ display:inline-flex; align-items:center; gap:5px; padding:8px 14px; border-radius:var(--rs); border:.5px solid var(--border2); background:transparent; color:var(--text); font-size:13px; font-weight:500; cursor:pointer; transition:background .1s; font-family:inherit; }
button:hover{ background:var(--surface2); }
button:active{ transform:scale(.98); }
button.primary{ background:var(--accent); color:#fff; border-color:transparent; }
button.primary:hover{ opacity:.9; background:var(--accent); }
button.danger{ color:#a32d2d; border-color:rgba(162,45,45,.25); }
button.danger:hover{ background:#fcebeb; }
button:disabled{ opacity:.4; cursor:not-allowed; pointer-events:none; }
@media(prefers-color-scheme:dark){ button.danger{ color:#f09595; border-color:rgba(240,149,149,.25); } button.danger:hover{ background:#501313; } }

/* UPLOAD */
.upload-card{ background:var(--surface); border:1.5px dashed var(--border2); border-radius:var(--r); padding:2rem 1.5rem; text-align:center; cursor:pointer; transition:border-color .15s,background .15s; position:relative; }
.upload-card:hover,.upload-card.drag-over{ border-color:var(--accent); background:var(--accent-bg); }
.upload-card input[type=file]{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon{ font-size:34px; color:var(--text3); margin-bottom:.6rem; }
.upload-card h2{ font-size:14px; font-weight:500; margin-bottom:3px; }
.upload-card p{ font-size:12px; color:var(--text3); }

/* PREVIEW */
.preview-wrap{ background:var(--surface); border:.5px solid var(--border); border-radius:var(--r); overflow:hidden; }
.preview-wrap img{ width:100%; max-height:300px; object-fit:contain; display:block; background:var(--surface2); }
.preview-toolbar{ display:flex; align-items:center; gap:8px; padding:9px 12px; border-top:.5px solid var(--border); }
.preview-toolbar span{ font-size:12px; color:var(--text2); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* CONTEXT */
.context-card{ background:var(--surface); border:.5px solid var(--border); border-radius:var(--r); overflow:hidden; }
.context-card label{ display:block; font-size:11px; font-weight:500; color:var(--text3); padding:9px 13px 0; text-transform:uppercase; letter-spacing:.04em; }
.context-card textarea{ width:100%; border:none; background:transparent; color:var(--text); font-family:inherit; font-size:13px; line-height:1.6; padding:7px 13px 11px; resize:none; outline:none; min-height:58px; }
.context-card textarea::placeholder{ color:var(--text3); }

/* ANSWER */
.answer-card{ background:var(--surface); border:.5px solid var(--border); border-radius:var(--r); overflow:hidden; }
.answer-header{ display:flex; align-items:center; gap:8px; padding:11px 15px; border-bottom:.5px solid var(--border); background:var(--accent-bg); }
.answer-header i{ color:var(--accent); font-size:17px; }
.answer-header span{ font-size:13px; font-weight:500; color:var(--accent-t); }
.answer-body{ padding:1.1rem 1.4rem; font-size:14px; line-height:1.8; color:var(--text); white-space:pre-wrap; }

/* LOADING */
.loading-wrap{ display:flex; flex-direction:column; align-items:center; gap:10px; padding:2.2rem 1.5rem; }
.spinner{ width:28px; height:28px; border:2.5px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.loading-wrap p{ font-size:13px; color:var(--text2); text-align:center; }
.loading-wrap small{ font-size:11px; color:var(--text3); }

/* ERROR */
.error-card{ background:var(--c-red-bg); border:.5px solid rgba(162,45,45,.2); border-radius:var(--r); padding:1rem 1.2rem; color:var(--c-red-t); font-size:13px; line-height:1.6; display:flex; gap:9px; align-items:flex-start; }
.error-card i{ font-size:17px; flex-shrink:0; margin-top:1px; }

/* ACTION BAR */
.action-bar{ position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:.5px solid var(--border); padding:.65rem 1rem; display:flex; justify-content:center; gap:8px; z-index:25; }
.action-bar button{ min-width:148px; justify-content:center; }
#summaryActionBar{ display:none; }

/* ═══ RESÚMENES ═══ */

/* Search */
.search-wrap{ position:relative; }
.search-wrap i.ti-search{ position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:15px; color:var(--text3); pointer-events:none; }
.search-wrap input{ width:100%; padding:9px 13px 9px 34px; border:.5px solid var(--border2); border-radius:var(--rs); background:var(--surface); color:var(--text); font-size:13px; font-family:inherit; outline:none; transition:border-color .15s; }
.search-wrap input:focus{ border-color:var(--accent); }
.search-wrap input::placeholder{ color:var(--text3); }

/* Specialty grid */
.spec-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
.spec-card{ background:var(--surface); border:.5px solid var(--border); border-radius:var(--r); padding:1rem; cursor:pointer; transition:border-color .15s,background .15s; display:flex; flex-direction:column; gap:6px; text-align:left; }
.spec-card:hover{ border-color:var(--accent); }
.spec-icon{ width:34px; height:34px; border-radius:var(--rs); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.spec-name{ font-size:13px; font-weight:500; color:var(--text); line-height:1.3; }
.spec-count{ font-size:11px; color:var(--text3); }

/* Chapter list */
.chap-list{ display:flex; flex-direction:column; gap:6px; }
.chap-row{ background:var(--surface); border:.5px solid var(--border); border-radius:var(--rs); display:flex; align-items:center; gap:10px; padding:11px 13px; cursor:pointer; transition:background .12s,border-color .12s; }
.chap-row:hover{ background:var(--accent-bg); border-color:var(--accent); }
.chap-num{ font-size:10px; font-weight:500; padding:3px 7px; border-radius:5px; white-space:nowrap; flex-shrink:0; }
.chap-name{ font-size:13px; color:var(--text); flex:1; line-height:1.35; }
.chap-row>.ti{ color:var(--text3); font-size:13px; flex-shrink:0; }

/* Breadcrumb */
.breadcrumb{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text3); flex-wrap:wrap; }
.breadcrumb span{ cursor:pointer; }
.breadcrumb span:hover{ color:var(--accent); }
.breadcrumb .sep{ font-size:10px; }
.breadcrumb .cur{ color:var(--text); font-weight:500; cursor:default; }

/* Summary view */
.sum-header{ background:var(--surface); border:.5px solid var(--border); border-radius:var(--r); padding:.9rem 1.1rem; display:flex; align-items:flex-start; gap:12px; }
.sum-hicon{ width:38px; height:38px; border-radius:var(--rs); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.sum-hlabel{ font-size:10px; color:var(--text3); font-weight:500; text-transform:uppercase; letter-spacing:.04em; }
.sum-htitle{ font-size:15px; font-weight:500; color:var(--text); margin:2px 0; line-height:1.3; }
.sum-hsub{ font-size:11px; color:var(--text3); }

.sum-body{ background:var(--surface); border:.5px solid var(--border); border-radius:var(--r); padding:1.25rem 1.4rem; font-size:14px; line-height:1.85; color:var(--text); white-space:pre-wrap; }
.sum-body.lbody{ display:flex; flex-direction:column; align-items:center; gap:10px; padding:2.5rem 1.5rem; }

.sec-lbl{ font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; display:block; margin-top:1.1rem; margin-bottom:3px; }
.sec-lbl:first-child{ margin-top:0; }

/* View states */
#viewSpecs,#viewChaps,#viewSum{ display:none; }
#viewSpecs.vopen,#viewChaps.vopen,#viewSum.vopen{ display:flex; flex-direction:column; gap:1rem; }

.slabel{ font-size:11px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; }
</style>
</head>
<body>

<header>
  <div class="logo"><i class="ti ti-book-2" aria-hidden="true"></i></div>
  <div>
    <h1>Asistente de Examen</h1>
    <p>Harrison · Principios de Medicina Interna 22e</p>
  </div>
  <div class="hbadge"><i class="ti ti-sparkles"></i> IA médica</div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tabExam" onclick="switchTab('exam')">
    <i class="ti ti-camera" aria-hidden="true"></i> Resolver examen
  </button>
  <button class="tab-btn" id="tabSum" onclick="switchTab('sum')">
    <i class="ti ti-notebook" aria-hidden="true"></i> Resúmenes
  </button>
</div>

<!-- ═══ PANEL EXAMEN ═══ -->
<div class="tab-panel active" id="panelExam">
<main>
  <div class="upload-card" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <div class="upload-icon"><i class="ti ti-camera-up" aria-hidden="true"></i></div>
    <h2>Sube la foto de tu pregunta</h2>
    <p>Toma una foto del examen o elige una imagen</p>
  </div>
  <div class="preview-wrap" id="previewWrap" style="display:none;">
    <img id="previewImg" alt="Imagen de la pregunta">
    <div class="preview-toolbar">
      <span id="fileName">imagen.jpg</span>
      <button class="danger" onclick="clearImage()"><i class="ti ti-trash"></i> Quitar</button>
    </div>
  </div>
  <div class="context-card">
    <label for="contextInput">Contexto adicional (opcional)</label>
    <textarea id="contextInput" placeholder="Ej: opción múltiple, cardiología, RIII…"></textarea>
  </div>
  <div id="answerArea"></div>
</main>
<div class="action-bar" id="examActionBar">
  <button id="solveBtn" class="primary" onclick="solveQuestion()" disabled>
    <i class="ti ti-send"></i> Resolver con Harrison
  </button>
  <button onclick="resetAll()"><i class="ti ti-refresh"></i> Nueva pregunta</button>
</div>
</div>

<!-- ═══ PANEL RESÚMENES ═══ -->
<div class="tab-panel" id="panelSum">
<main>

  <div class="search-wrap">
    <i class="ti ti-search" aria-hidden="true"></i>
    <input type="text" id="chapSearch" placeholder="Buscar capítulo, diagnóstico o tema…" oninput="onSearch()">
  </div>

  <!-- Vista 1: Especialidades -->
  <div id="viewSpecs" class="vopen">
    <span class="slabel">Especialidad clínica</span>
    <div class="spec-grid" id="specGrid"></div>
  </div>

  <!-- Vista 2: Capítulos de especialidad -->
  <div id="viewChaps">
    <div class="breadcrumb" id="breadChaps"></div>
    <div class="chap-list" id="chapList"></div>
  </div>

  <!-- Vista 3: Resumen de capítulo -->
  <div id="viewSum">
    <div class="breadcrumb" id="breadSum"></div>
    <div class="sum-header" id="sumHeader"></div>
    <div class="sum-body" id="sumBody"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:.25rem;">
      <button onclick="copySummary()"><i class="ti ti-copy"></i> Copiar resumen</button>
    </div>
  </div>

</main>
<div class="action-bar" id="summaryActionBar">
  <button id="backBtn" onclick="goBack()"><i class="ti ti-arrow-left"></i> Atrás</button>
</div>
</div>

<script>

/* ═══════════ STATE ═══════════ */
let currentSpec = null;
let currentChap = null;
const summaryCache = {};

/* ═══════════ TAB ═══════════ */
function switchTab(tab){
  ['panelExam','panelSum'].forEach(id=>document.getElementById(id).classList.remove('active'));
  ['tabExam','tabSum'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(tab==='exam'?'panelExam':'panelSum').classList.add('active');
  document.getElementById(tab==='exam'?'tabExam':'tabSum').classList.add('active');
  document.getElementById('examActionBar').style.display    = tab==='exam'?'flex':'none';
  document.getElementById('summaryActionBar').style.display = (tab==='sum' && (currentSpec||currentChap))?'flex':'none';
}

/* ═══════════ SPECIALTY GRID ═══════════ */
function initSpecGrid(){
  const grid = document.getElementById('specGrid');
  grid.innerHTML = SPECIALTIES.map(s=>{
    const chaps = CHAPTERS[s.id]||[];
    const c = CMAP[s.color]||CMAP.gray;
    return `<div class="spec-card" onclick="openSpec('${s.id}')">
      <div class="spec-icon" style="background:${c.bg};color:${c.t};">
        <i class="ti ${s.icon}" aria-hidden="true"></i>
      </div>
      <div class="spec-name">${s.name}</div>
      <div class="spec-count">${chaps.length} capítulos</div>
    </div>`;
  }).join('');
}

/* ═══════════ OPEN SPECIALTY ═══════════ */
function openSpec(specId){
  currentSpec = specId;
  currentChap = null;
  const spec = SPECIALTIES.find(s=>s.id===specId);
  const chaps = CHAPTERS[specId]||[];
  const c = CMAP[spec.color]||CMAP.gray;

  show('viewChaps');
  document.getElementById('breadChaps').innerHTML =
    `<span onclick="goHome()">Especialidades</span>
     <span class="sep">›</span>
     <span class="cur">${spec.name}</span>`;

  document.getElementById('chapList').innerHTML = chaps.map((ch,i)=>`
    <div class="chap-row" onclick="openChap('${specId}',${i})">
      <span class="chap-num" style="background:${c.bg};color:${c.t};">${ch.n}</span>
      <span class="chap-name">${ch.t}</span>
      <i class="ti ti-chevron-right"></i>
    </div>`).join('');

  document.getElementById('summaryActionBar').style.display='flex';
}

/* ═══════════ OPEN CHAPTER ═══════════ */
async function openChap(specId, idx){
  const spec = SPECIALTIES.find(s=>s.id===specId);
  const chap = CHAPTERS[specId][idx];
  currentChap = {specId, idx};
  const c = CMAP[spec.color]||CMAP.gray;
  const cacheKey = specId+'_'+idx;

  show('viewSum');
  document.getElementById('breadSum').innerHTML =
    `<span onclick="goHome()">Especialidades</span>
     <span class="sep">›</span>
     <span onclick="openSpec('${specId}')">${spec.name}</span>
     <span class="sep">›</span>
     <span class="cur">${chap.n}</span>`;

  document.getElementById('sumHeader').innerHTML=`
    <div class="sum-hicon" style="background:${c.bg};color:${c.t};">
      <i class="ti ${spec.icon}" aria-hidden="true"></i>
    </div>
    <div>
      <div class="sum-hlabel">Harrison 22e · ${chap.n}</div>
      <div class="sum-htitle">${chap.t}</div>
      <div class="sum-hsub">${spec.name} · Resumen clínico</div>
    </div>`;

  const body = document.getElementById('sumBody');

  if(summaryCache[cacheKey]){
    body.className='sum-body';
    body.innerHTML=summaryCache[cacheKey];
    return;
  }

  body.className='sum-body lbody';
  body.innerHTML=`<div class="spinner"></div><p>Generando resumen…</p><small>Harrison 22e · ${chap.n}</small>`;

  const sys=`Eres un profesor experto en medicina interna con dominio enciclopédico de Harrison. Principios de Medicina Interna, 22.ª edición (McGraw-Hill, 2025).

Genera resúmenes clínicos estructurados, precisos y memorables para residentes que se preparan para exámenes de medicina interna.

Usa EXACTAMENTE este formato (sin markdown, sin asteriscos):

📌 DEFINICIÓN Y EPIDEMIOLOGÍA
[Definición, prevalencia, grupos de riesgo — 2-3 oraciones]

🔬 FISIOPATOLOGÍA
[Mecanismo central, vías moleculares clave — conciso]

🩺 CUADRO CLÍNICO
[Síntomas y signos principales, presentación típica vs atípica]

🔍 DIAGNÓSTICO
[Criterios, estudios de primera línea, valores de corte, imágenes]

💊 TRATAMIENTO
[Primera y segunda línea, dosis relevantes, indicaciones especiales, contraindicaciones]

⚠️ PERLAS PARA EL EXAMEN
[5 puntos críticos: asociaciones patognomónicas, números que se preguntan, errores frecuentes, diagnósticos diferenciales clave]

Sé preciso. Usa terminología médica correcta. Prioriza datos evaluables en examen.`;

  try{
    const r=await fetch("https://harrison-proxy.drcardeh.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:5000,
        system:sys,
        messages:[{role:"user",content:`Genera el resumen clínico completo del ${chap.n} del Harrison 22e: "${chap.t}". Especialidad: ${spec.name}.`}]
      })
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${r.status}`);}
    const data=await r.json();
    const txt=data.content?.map(b=>b.text||'').join('')||'';
    if(!txt)throw new Error('Sin respuesta.');
    const html=formatSummary(txt);
    summaryCache[cacheKey]=html;
    body.className='sum-body';
    body.innerHTML=html;
  }catch(err){
    body.className='sum-body';
    body.innerHTML=`<div class="error-card"><i class="ti ti-alert-triangle"></i><div><strong>Error al generar</strong><br>${err.message}</div></div>`;
  }
}

function formatSummary(txt){
  const esc=txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc
    .replace(/(📌 DEFINICIÓN Y EPIDEMIOLOGÍA)/g,'<span class="sec-lbl" style="color:var(--c-purple-t);">$1</span>')
    .replace(/(🔬 FISIOPATOLOGÍA)/g,'<span class="sec-lbl" style="color:var(--c-teal-t);">$1</span>')
    .replace(/(🩺 CUADRO CLÍNICO)/g,'<span class="sec-lbl" style="color:var(--c-blue-t);">$1</span>')
    .replace(/(🔍 DIAGNÓSTICO)/g,'<span class="sec-lbl" style="color:var(--c-teal-t);">$1</span>')
    .replace(/(💊 TRATAMIENTO)/g,'<span class="sec-lbl" style="color:var(--c-green-t);">$1</span>')
    .replace(/(⚠️ PERLAS PARA EL EXAMEN)/g,'<span class="sec-lbl" style="color:var(--c-amber-t);">$1</span>');
}

function copySummary(){
  const b=document.getElementById('sumBody');
  if(b)navigator.clipboard.writeText(b.innerText);
}

/* ═══════════ SEARCH ═══════════ */
function onSearch(){
  const q=document.getElementById('chapSearch').value.toLowerCase().trim();
  if(!q){
    if(currentChap){ show('viewSum'); return; }
    if(currentSpec){ show('viewChaps'); return; }
    show('viewSpecs'); return;
  }
  const results=[];
  SPECIALTIES.forEach(s=>{
    const chaps=CHAPTERS[s.id]||[];
    chaps.forEach((ch,i)=>{
      if(ch.t.toLowerCase().includes(q)||ch.n.toLowerCase().includes(q)){
        results.push({spec:s,chap:ch,idx:i});
      }
    });
  });
  showSearch(results, q);
}

function showSearch(results, q){
  show('viewChaps');
  document.getElementById('breadChaps').innerHTML=
    `<span class="cur">Búsqueda: "${q}"</span>`;
  if(!results.length){
    document.getElementById('chapList').innerHTML=
      '<p style="color:var(--text3);font-size:13px;padding:.5rem 0;">No se encontraron capítulos.</p>';
    return;
  }
  document.getElementById('chapList').innerHTML=results.map(r=>{
    const c=CMAP[r.spec.color]||CMAP.gray;
    return `<div class="chap-row" onclick="openChap('${r.spec.id}',${r.idx})">
      <span class="chap-num" style="background:${c.bg};color:${c.t};">${r.chap.n}</span>
      <span class="chap-name">${r.chap.t}<br><span style="font-size:11px;color:var(--text3);">${r.spec.name}</span></span>
      <i class="ti ti-chevron-right"></i>
    </div>`;
  }).join('');
}

/* ═══════════ NAV ═══════════ */
function show(viewId){
  ['viewSpecs','viewChaps','viewSum'].forEach(id=>{
    document.getElementById(id).classList.toggle('vopen', id===viewId);
  });
}

function goHome(){
  currentSpec=null; currentChap=null;
  document.getElementById('chapSearch').value='';
  show('viewSpecs');
  document.getElementById('summaryActionBar').style.display='none';
}

function goBack(){
  if(currentChap){
    currentChap=null;
    openSpec(currentSpec);
  } else if(currentSpec){
    goHome();
  }
}

/* ═══════════ EXAM TAB ═══════════ */
let currentBase64=null, currentMime='image/jpeg';
const fileInput=document.getElementById('fileInput');
const uploadZone=document.getElementById('uploadZone');
const previewWrap=document.getElementById('previewWrap');
const previewImg=document.getElementById('previewImg');
const fileNameEl=document.getElementById('fileName');
const solveBtn=document.getElementById('solveBtn');
const answerArea=document.getElementById('answerArea');

fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)handleFile(f);});
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('drag-over');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop',e=>{
  e.preventDefault();uploadZone.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))handleFile(f);
});

function handleFile(f){
  currentMime=f.type||'image/jpeg';
  fileNameEl.textContent=f.name;
  const reader=new FileReader();
  reader.onload=ev=>{
    currentBase64=ev.target.result.split(',')[1];
    previewImg.src=ev.target.result;
    previewWrap.style.display='block';
    uploadZone.style.display='none';
    solveBtn.disabled=false;
    answerArea.innerHTML='';
  };
  reader.readAsDataURL(f);
}

function clearImage(){
  currentBase64=null;
  previewWrap.style.display='none';
  uploadZone.style.display='block';
  fileInput.value='';
  solveBtn.disabled=true;
  answerArea.innerHTML='';
}

function resetAll(){ clearImage(); document.getElementById('contextInput').value=''; }

async function solveQuestion(){
  if(!currentBase64)return;
  const extra=document.getElementById('contextInput').value.trim();
  answerArea.innerHTML=`<div class="answer-card"><div class="loading-wrap"><div class="spinner"></div><p>Consultando Harrison 22e…</p><small>Analizando la imagen y buscando la respuesta</small></div></div>`;
  solveBtn.disabled=true;

  const sys=`Eres un experto en medicina interna con dominio enciclopédico del Harrison. Principios de Medicina Interna, 22.ª edición (McGraw-Hill, 2025). Ayudas a residentes de tercer año a resolver preguntas de examen.

Para cada pregunta:
1. Identifica el tema exacto.
2. Indica el capítulo de Harrison 22e.
3. Da la respuesta correcta directamente.
4. Explica el razonamiento fisiopatológico.
5. Agrega el dato clave más evaluable.

Formato EXACTO (sin markdown):
📌 Tema: [tema]
📖 Harrison 22e: Capítulo [N] — [nombre]

✅ Respuesta: [respuesta directa y concisa]

🔬 Explicación: [razonamiento clínico basado en Harrison]

💡 Perla de examen: [dato clave para no olvidar]`;

  try{
    const r=await fetch("https://harrison-proxy.drcardeh.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:sys,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:currentMime,data:currentBase64}},
          {type:"text",text:`Resuelve esta pregunta de examen basándote en Harrison 22e.${extra?'\n\nContexto: '+extra:''}`}
        ]}]
      })
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${r.status}`);}
    const data=await r.json();
    const txt=data.content?.map(b=>b.text||'').join('')||'';
    if(!txt)throw new Error('Respuesta vacía.');
    renderAnswer(txt);
  }catch(err){
    answerArea.innerHTML=`<div class="error-card"><i class="ti ti-alert-triangle"></i><div><strong>No se pudo obtener la respuesta</strong><br>${err.message}</div></div>`;
  }finally{
    solveBtn.disabled=false;
  }
}

function renderAnswer(txt){
  const esc=txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const html=esc
    .replace(/📌 Tema:/g,'<span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:500;">📌 Tema</span><br>')
    .replace(/📖 Harrison 22e:/g,'<span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:500;">📖 Harrison 22e</span><br>')
    .replace(/✅ Respuesta:/g,'<span style="color:var(--c-green-t);font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:500;">✅ Respuesta</span><br>')
    .replace(/🔬 Explicación:/g,'<span style="color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:500;">🔬 Explicación</span><br>')
    .replace(/💡 Perla de examen:/g,'<span style="color:var(--c-amber-t);font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:500;">💡 Perla de examen</span><br>');
  answerArea.innerHTML=`
    <div class="answer-card">
      <div class="answer-header">
        <i class="ti ti-stethoscope"></i>
        <span>Respuesta basada en Harrison 22e</span>
      </div>
      <div class="answer-body">${html}</div>
      <div style="padding:0 1.4rem .9rem;">
        <button onclick="copyAnswer()"><i class="ti ti-copy"></i> Copiar respuesta</button>
      </div>
    </div>`;
}

function copyAnswer(){
  const b=document.querySelector('.answer-body');
  if(b)navigator.clipboard.writeText(b.innerText);
}

/* ═══════════ INIT ═══════════ */
initSpecGrid();
show('viewSpecs');
document.getElementById('examActionBar').style.display='flex';
</script>
